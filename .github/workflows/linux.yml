name: Linux
on:
  push:
    branches:
      - main
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
  pull_request:
    branches:
      - main
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Runner specs
        run: |
          nproc
          free -h
          cat /proc/cpuinfo | grep "model name" | head -1
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
      - name: Restore models cache
        id: cache-models
        uses: actions/cache/restore@v5
        with:
          path: ~/.kronk/models
          key: ${{ runner.os }}-models-v3
      - name: Install kronk command
        run: go install ./cmd/kronk
      - name: Install Libs
        # The default behavior of `kronk libs --local` (no flags) installs
        # the well-known defaultVersion baked into sdk/tools/libs/libs.go.
        # Bumping defaultVersion in code rolls CI forward; CI never
        # silently tracks llama.cpp's latest tag.
        run: |
          mkdir -p $HOME/.kronk/libraries
          kronk libs --local
      - name: Download test models
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: |
          mkdir -p $HOME/.kronk/models
          kronk model pull --local unsloth/Qwen3.5-0.8B-Q8_0
          kronk model pull --local Qwen/Qwen3-8B-Q8_0
          kronk model pull --local ggml-org/embeddinggemma-300m-qat-Q8_0
          kronk model pull --local gpustack/bge-reranker-v2-m3-Q8_0
      - name: Install static analysis tools
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run api/service tests
        timeout-minutes: 30
        run: |
          export RUN_IN_PARALLEL=no
          go test -v -p=1 -count=1 ./cmd/server/...
      - name: Run sdk tests
        run: |
          export RUN_IN_PARALLEL=no
          go test -v -p=1 -count=1 $(go list ./sdk/... | grep -v '/sdk/kronk/tests')
      - name: Run vet, linter, vuln, diff checks
        run: |
          go vet ./...
          staticcheck -checks=all ./...
          govulncheck ./...
          go fix -diff ./...
      - name: Delete existing models cache
        if: github.ref == 'refs/heads/main' && steps.cache-models.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh cache delete "${{ runner.os }}-models-v3" --repo ${{ github.repository }} || true
      - name: Save models cache
        if: github.ref == 'refs/heads/main' && steps.cache-models.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: ~/.kronk/models
          key: ${{ runner.os }}-models-v3
