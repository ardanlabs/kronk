version: 2

project_name: kronk

builds:
  - id: kronk
    main: ./cmd/kronk
    binary: kronk
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # Mirror the link-time version stamping done by the Docker workflow
    # (.github/workflows/docker.yml) and the Dockerfile. Without -X, the
    # `sdk/kronk.Version` var keeps its "dev" default and every binary
    # shipped via the release archives / Homebrew cask would print
    # `kronk version dev`. {{.Version}} is the git tag with the leading
    # `v` stripped (e.g. tag `v1.26.5` → `1.26.5`); prefix it back so the
    # CLI matches the published tag.
    ldflags:
      - -s -w
      - -X github.com/ardanlabs/kronk/sdk/kronk.Version=v{{.Version}}
    # `-trimpath` makes the resulting binary reproducible across build
    # machines by stripping absolute module/source paths from the
    # embedded debug info — matching what the Dockerfile builder uses.
    flags:
      - -trimpath

before:
  hooks:
    - make kronk-docs
# FIXME: tsc fails on this
#    - make bui-build

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

# NOTE: GoReleaser deprecated `brews:` in favor of `homebrew_casks:` (v2.10).
# Per the GoReleaser maintainer, casks generated this way work on both macOS
# and Linuxbrew, so this is the recommended path going forward.
homebrew_casks:
  - name: kronk
    binaries:
      - kronk
    repository:
      owner: ardanlabs
      name: homebrew-kronk
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/ardanlabs/kronk"
    description: "Local LLM inference SDK and server CLI"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "kronk {{ .Tag }}"
    # Strip the macOS Gatekeeper quarantine bit so unsigned binaries run
    # without "developer cannot be verified" prompts.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/kronk"]
          end
